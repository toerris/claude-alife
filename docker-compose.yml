services:
  alife:
    build: .
    ports:
      - "8000:8000"
      - "9000:9000"
    environment:
      ALIFE_WEB_HOST: 0.0.0.0
      ALIFE_WEB_PORT: 8000
      ALIFE_AGENT_HOST: 0.0.0.0
      ALIFE_AGENT_PORT: 9000
      ALIFE_INITIAL_POP: 120
      ALIFE_INITIAL_FOOD: 200
      ALIFE_TICK_HZ: 30
    restart: unless-stopped
